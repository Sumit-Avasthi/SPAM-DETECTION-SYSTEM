<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Email Spam Detection</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(135deg,#0f172a,#1e293b);

    color:white;

    padding:20px;
}

.card{

    width:100%;

    max-width:650px;

    background:rgba(255,255,255,.05);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.08);

    border-radius:20px;

    padding:50px 35px;

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,.35);
}

.icon{

    font-size:90px;

    margin-bottom:20px;
}

h1{

    font-size:2.4rem;

    margin-bottom:15px;
}

p{

    color:#cbd5e1;

    line-height:1.8;

    margin-bottom:35px;
}

.status{

    display:inline-block;

    background:#f59e0b;

    color:#111827;

    font-weight:600;

    padding:10px 25px;

    border-radius:30px;

    margin-bottom:35px;
}

.btn{

    display:inline-block;

    text-decoration:none;

    color:white;

    background:#2563eb;

    padding:14px 30px;

    border-radius:10px;

    transition:.3s;
}

.btn:hover{

    background:#1d4ed8;
}

@media(max-width:768px){

    .card{

        padding:35px 25px;
    }

    h1{

        font-size:2rem;
    }

    .icon{

        font-size:70px;
    }

}

@media(max-width:480px){

    h1{

        font-size:1.6rem;
    }

    p{

        font-size:.95rem;
    }

    .icon{

        font-size:60px;
    }

    .btn{

        width:100%;
    }

}

    </style>

</head>

<body>

<div class="card">

    <div class="icon">

        📧

    </div>

    <h1>

        Email Spam Detection

    </h1>

    <div class="status">

        🚧 Coming Soon

    </div>

    <p>

        The Email Spam Detection module is currently under development.
        Soon you'll be able to analyze emails for spam and phishing attacks
        using Machine Learning.

    </p>

    <a href="/" class="btn">

        ← Back to Home

    </a>

</div>

</body>

</html>
